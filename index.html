<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koowzah Brand</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h1>Koowzah</h1>
  </div>

  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#videos">Videos</a>
    <a href="#about">About</a>
  </nav>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h2 class="fade-in">Build Your Future</h2>
  <p class="fade-in delay">Create. Grow. Dominate.</p>
  <a href="#videos" class="btn fade-in delay2">Start Watching</a>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stat">
    <h3 id="subCount">0</h3>
    <p>Subscribers</p>
  </div>
  <div class="stat">
    <h3 id="videoCount">0</h3>
    <p>Videos</p>
  </div>
</section>

<!-- VIDEOS -->
<section id="videos" class="videos">
  <h2>Latest Videos</h2>
  <div class="video-container" id="videoContainer"></div>
</section>

<!-- ABOUT -->
<section id="about" class="about">
  <h2>About Me</h2>
  <p>I build content about growth, mindset, and success. Join the journey.</p>
</section>

<footer>
  <p>© 2026 Koowzah Brand</p>
</footer>

<script src="script.js"></script>
</body>
</html>
